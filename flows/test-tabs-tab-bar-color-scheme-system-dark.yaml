# e2e flow — Tabs · colorScheme (SYSTEM=DARK source × TabsHost override)
#
# Source of truth: apps/src/tests/single-feature-tests/tabs/test-tabs-tab-bar-color-scheme/index.tsx
#
# One HALF of the system-source matrix (the DARK row). Its twin is
# test-tabs-tab-bar-color-scheme-system-light.yaml. Both are driven by the wrapper
#   scripts/run-tab-bar-color-scheme-system.sh
# which SETS the OS appearance (via `xcrun simctl … appearance` on iOS / `adb … cmd uimode` on Android)
# and THEN runs each flow headless — because the argent flow engine has no shell step and there is no
# in-app control for the system appearance, so the flip must happen OUTSIDE the YAML, before launch.
#
# PRECONDITION (the wrapper guarantees this): system appearance is already DARK when this flow starts.
# Run standalone only after setting it yourself:
#   xcrun simctl ui booted appearance dark        # iOS simulator
#   adb shell "cmd uimode night yes"              # Android emulator
#   argent flow run test-tabs-tab-bar-color-scheme-system-dark --platform ios   # (or android)
#
# What it proves (RN source held at `unspecified` the whole time → asserted at every state):
#   system=DARK, TabsHost=inherit → DARK  (defers to system)
#   system=DARK, TabsHost=light   → LIGHT (prop OVERRIDES system dark)
#   system=DARK, TabsHost=dark    → DARK  (explicit, matches system)
# The `snapshot`s are the real assertion (Detox can't read colors); the `assert`s only confirm the
# picker VALUES driving each snapshot. Selector rig matches the RN sibling flow: strict `{ text: … }`
# for navigation, IDENTIFIER selectors for the TabsHost picker/options (safe because the RN picker is
# never expanded, so `colorscheme-*` resolves unambiguously to the one open TabsHost picker).
#
# BASELINES (seed once, then commit .argent/flows/__baselines__/…-system-dark/):
#   scripts/run-tab-bar-color-scheme-system.sh ios --update-baselines
# maxMismatch 7.0 absorbs the dev LogBox banner + status-bar clock; the light↔dark delta is whole-screen.

steps:
  - launch:
      ios: org.reactjs.native.example.FabricExample
      android: com.fabricexample

  # --- Navigate: Home → Single Feature Tests → Tabs → Tab Bar Color Scheme ---
  - echo: "On the example home screen — open Single Feature Tests"
  - scroll-to: { target: { text: "Single Feature Tests" }, direction: down }
  - wait: 600
  - tap: { text: "Single Feature Tests" }
  - wait: 700
  - assert: { visible: "FormSheet" }   # nav-verify: unique to the Scenarios screen

  - echo: "On the Scenarios list — open the Tabs group"
  - tap: { text: "Tabs" }
  - wait: 700

  - echo: "On the Tabs scenarios list — open the Tab Bar Color Scheme scenario"
  - scroll-to: { target: { text: "Tab Bar Color Scheme" }, direction: down }
  - wait: 600
  - tap: { text: "Tab Bar Color Scheme" }
  - wait: 1200

  # --- State A: system=DARK, RN=unspecified, TabsHost=inherit (defaults) → DARK (defers to system) ---
  - echo: "Screen loaded — RN=unspecified, TabsHost=inherit; system is DARK"
  - assert: { visible: "TabsHost color scheme" }
  - assert: { text: { in: { identifier: react-color-scheme-picker }, contains: "colorScheme: unspecified" } }
  - assert: { text: { in: { identifier: tabshost-color-scheme-picker }, contains: "colorScheme: inherit" } }
  - wait: 600
  - echo: "TabsHost=inherit defers to system=DARK → tab screen is DARK"
  - snapshot: { name: system-dark-tabshost-inherit, maxMismatch: 7.0 }

  # --- State B: TabsHost=light → LIGHT (overrides system dark) ---
  - echo: "Set TabsHost colorScheme = light (expand → light → collapse)"
  - tap: { identifier: tabshost-color-scheme-picker }
  - tap: { identifier: "colorscheme-light" }
  - wait: 400
  - tap: { identifier: tabshost-color-scheme-picker }
  - wait: 600
  - assert: { text: { in: { identifier: react-color-scheme-picker }, contains: "colorScheme: unspecified" } }
  - assert: { text: { in: { identifier: tabshost-color-scheme-picker }, contains: "colorScheme: light" } }
  - echo: "TabsHost=light overrides system=DARK → tab screen is LIGHT"
  - snapshot: { name: system-dark-tabshost-light, maxMismatch: 7.0 }

  # --- State C: TabsHost=dark → DARK (explicit, matches system) ---
  - echo: "Set TabsHost colorScheme = dark (expand → dark → collapse)"
  - tap: { identifier: tabshost-color-scheme-picker }
  - tap: { identifier: "colorscheme-dark" }
  - wait: 400
  - tap: { identifier: tabshost-color-scheme-picker }
  - wait: 600
  - assert: { text: { in: { identifier: react-color-scheme-picker }, contains: "colorScheme: unspecified" } }
  - assert: { text: { in: { identifier: tabshost-color-scheme-picker }, contains: "colorScheme: dark" } }
  - echo: "TabsHost=dark matches system=DARK → tab screen is DARK"
  - snapshot: { name: system-dark-tabshost-dark, maxMismatch: 7.0 }

  - echo: "Done (system=DARK): TabsHost=light overrode the dark system source; inherit/dark stayed DARK. RN stayed unspecified."
